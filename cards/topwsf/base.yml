## This card includes all base configurations for the top/W tag-and-probe SF routine
## Please do not modify the content here but instead rewrite the item in the calibration config cards

version: v3.1.3

##############################
## Configuration on modules ##
##############################

# overall configuration
workers: [20, 20]  # number of concurrent workers for the coffea template step and the combined fit step
run_step: 11  # two bool digits to control whether or not to run each of the two steps
skip_coffea: false  # if true, skip running the coffea step and directly load the existing step-1 outputs

routine_name: topwsf_default  # routine name used for output/{routine_name}_{year}_{nano_version} and web/{routine_name}_{year}_{nano_version}
category: w  # calibration category. Supported keys are defined in fit.poi_categories
year: 2018  # data-taking year
nano_version: v9  # NanoAOD/NanoHRT production version used in output and web directory names
sample_base: /home/pku/licq/hcc/new/samples/trees_sf/20260626_NanoCpp_ntuple_muon  # base input directory prefix; _{year}_{nano_version} is appended automatically
sample_scan_wp: /home/pku/licq/hcc/new/samples/trees_sf/20260626_NanoCpp_ntuple_minimal  # only needed by scan_wp.py; not used by the main topwsf routine

# 1_template options
apply_toppt_weight: true  # if true, apply topptWeight for MC samples when the branch is available
systematics: [pu, jes, jer, met, jms, jmr, lhescalemuf, lhescalemur]  # uncertainty list to run
custom_selection: null  # optional additional event selection applied after `selection` and before all step-1 templates/plots

# event selection used in the coffea template step
selection: (passmetfilters) & (passMuTrig) & (fj_1_eta > -2.4) & (fj_1_eta < 2.4) & (fj_1_pt >= 200.) & (leptonicW_pt > 150.)

# template variable and binning definitions
template_mass_bins: [34, 50.0, 220.0]  # [nbins, low, high] for the mass axis
template_pt_bins: [100, 200.0, 1200.0]  # [nbins, low, high] for the pT axis
template_jms_up: 1.05  # scale factor applied to mass for the jmsUp template
template_jms_down: 0.95  # scale factor applied to mass for the jmsDown template
template_jmr_sigma: 0.10  # deterministic smearing width used for jmrUp/Down templates
template_reflect_jmr_down: false  # if true, build jmrDown as 2*nominal - jmrUp; otherwise jmrDown is nominal

# 2_fit options
skip_fit: false  # if true, skip combine and directly make plots from existing fit outputs
fit_run_impact: true  # if true, run combine impacts after the fit
fit_impact_parallel: 8  # number of parallel combine jobs for impacts
fit_auto_mc_stats: 0  # autoMCStats threshold passed to the combine datacard
fit_poi_categories:  # POI order passed to TagAndProbeExtended for each calibration category
  top: [tp3, tp2, tp1, other]
  w: [tp2, tp3, tp1, other]

fit_processes: [tp3, tp2, tp1, other]  # processes written into the pass/fail fit inputs
plot_process_order: [other, tp1, tp2, tp3]  # stack order used in prefit and postfit plots
plot_colors: [lightgrey, "#e42536", "#f89c20", "#5790fc"]  # stack colors used in pre/post-fit plots
process_labels:
  tp3: Top-merged
  tp2: W-merged
  tp1: Non-merged
  other: Other


#######################
## Predefined values ##
#######################

lumi_dict: {"2015": 19.52, "2016": 16.81, "2017": 41.48, "2018": 59.83, "2022": 7.9804, "2022EE": 26.6717, "2023": 18.063, "2023BPix": 9.693, "2024": 108.96, "2025": 110.59}
lumi_uncertainty: {"2015": 1.025, "2016APV": 1.025, "2016": 1.025, "2017": 1.025, "2018": 1.025, "2022": 1.025, "2022EE": 1.025, "2023": 1.025, "2023BPix": 1.025, "2024": 1.025, "2025": 1.025}

top_process_groups: [ttbar-powheg, singletop, ttv]  # sample groups split into tp3/tp2/tp1 by generator matching
enabled_sample_groups: [ttbar-powheg, singletop, diboson, ttv, w]  # MC sample groups enabled by default

# LHEScaleWeight indices used to build muF/muR shape variations
lhe_scale_weights:
  nominal: 4
  muf_up: 5
  muf_down: 3
  mur_up: 7
  mur_down: 1
